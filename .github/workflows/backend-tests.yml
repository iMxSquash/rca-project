name: "Backend Tests"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q pytest pytest-cov flask==3.0.0 psycopg2-binary==2.9.9 redis==5.0.1 flask-cors==4.0.0

      - name: Run tests
        run: pytest tests/ -v --tb=short
